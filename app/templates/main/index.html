{% extends "base.html" %}
{% block title %}Dashboard — {{ config.APP_NAME }}{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-8">Dashboard</h1>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
  <div class="bg-gray-900 rounded-xl p-5 flex flex-col gap-1">
    <span class="text-3xl font-bold text-indigo-400">{{ item_count }}</span>
    <span class="text-sm text-gray-400">Items</span>
  </div>
</div>

<p class="text-gray-500">
  Get started by <a href="{{ url_for('items.add') }}" class="text-indigo-400 hover:underline">adding an item</a>,
  or replace this dashboard with your own content.
</p>
{% endblock %}
